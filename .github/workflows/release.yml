name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write
  packages: write

# mlugg/setup-zig still ships as a node20 action; opt into the node24 runtime now
# so we don't emit the deprecation warning. Drop once the action migrates.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Build the standalone `ts` CLI client for each target. Linux is static musl
  # (via cargo-zigbuild) so the binaries run on any glibc; darwin builds native.
  ts-build:
    name: ts ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: darwin
            arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up zig + cargo-zigbuild (linux)
        if: matrix.os == 'linux'
        uses: mlugg/setup-zig@v2.2.1
      - name: Install cargo-zigbuild (linux)
        if: matrix.os == 'linux'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build ts
        run: |
          if [ "${{ matrix.os }}" = "linux" ]; then
            cargo zigbuild --release -p ts --target ${{ matrix.target }}
          else
            cargo build --release -p ts --target ${{ matrix.target }}
          fi

      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ts" "dist/ts-${{ matrix.os }}-${{ matrix.arch }}"

      # Throwaway hand-off to the `ts-release` job within the same run; the real
      # binaries live on the published GitHub Release. 1-day retention.
      - uses: actions/upload-artifact@v7
        with:
          name: ts-bin-${{ matrix.os }}-${{ matrix.arch }}
          retention-days: 1
          path: dist/ts-${{ matrix.os }}-${{ matrix.arch }}

  ts-release:
    needs: ts-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Compute checksums
        working-directory: dist
        run: sha256sum ts-* > SHA256SUMS
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/ts-*
            dist/SHA256SUMS

  # Build + push the trickshot image to GitHub Container Registry, tag-driven.
  # Uses the built-in GITHUB_TOKEN — no extra registry secrets needed.
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # linux/amd64 only — matches the single-arch deploy the cluster runs.
      - name: Build + push trickshot image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: crates/trickshot-server/deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/dorskfr/trickshot:${{ steps.ver.outputs.version }}
